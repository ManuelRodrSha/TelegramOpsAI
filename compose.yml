
services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: telegramopsai-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

    restart: unless-stopped

  postgres:
    image: postgres:17

    container_name: telegramopsai-db

    environment:
      POSTGRES_DB: telegramopsai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
